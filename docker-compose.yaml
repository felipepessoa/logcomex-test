services:
  backend:
    container_name: backend
    build:
      context: ./backend/docker
      dockerfile: ./Dockerfile
    image: logcomex/backend
    entrypoint: /backend/docker/entrypoint.sh
    working_dir: /backend
    env_file:
      - ".env"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - "./backend:/backend"
      - "caddy_data:/data"
      - "caddy_config:/config"
    environment:
      SANCTUM_STATEFUL_DOMAINS: "${BASE_URL}"
    depends_on:
      database:
        condition: "service_healthy"
      redis:
        condition: "service_healthy"
      frontend:
        condition: "service_started"
  database:
    container_name: database
    image: mysql:8
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "database:/var/lib/mysql"
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 'localhost'"]
      interval: "120s"
      timeout: "1s"
      start_period: "10s"
      retries: 3
  redis:
    container_name: redis
    image: "redis:8.4.0-alpine"
    healthcheck: &redis-healthcheck
      test: ["CMD", "redis-cli", "ping"]
      interval: "10s"
      timeout: "1s"
      start_period: "5s"
      retries: 3
  frontend:
    container_name: frontend
    build:
      context: ./frontend/docker
      dockerfile: ./Dockerfile
    image: logcomex/frontend
    entrypoint: /frontend/docker/entrypoint.sh
    volumes:
      - "./frontend:/frontend"
    # Porta 3100 exposta apenas internamente (acessível via Caddy proxy)
    expose:
      - "3100"

volumes:
  database:
  caddy_data:
  caddy_config:
